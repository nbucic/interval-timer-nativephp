name: Run Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: zip, sqlite3, pdo_sqlite
          coverage: none

      - name: Remove local path repositories (CI only)
        run: |
          jq 'del(.repositories[] | select(.type == "path")) | del(."require-dev"."nbucic/audio-tts")' \
            composer.json > tmp.json && mv tmp.json composer.json
          composer update --lock --no-scripts --no-interaction --quiet

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: composer test
