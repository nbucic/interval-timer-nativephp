name: Build Android APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NATIVEPHP_APP_ID: com.nikolabucic.intervaltimer
      NATIVEPHP_ANDROID_DEBUG_SYMBOLS: NONE

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: zip, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-no-dev-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-no-dev-

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Read app version
        id: version
        run: echo "version=$(jq -r '.version' version.json)" >> $GITHUB_OUTPUT

      - name: Install Android project
        env:
          NATIVEPHP_GRADLE_PATH: ${{ env.JAVA_HOME }}
          NATIVEPHP_ANDROID_SDK_LOCATION: ${{ env.ANDROID_SDK_ROOT }}
        run: php artisan native:install android 2>&1 | cat; exit ${PIPESTATUS[0]}

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APK
        env:
          NATIVEPHP_GRADLE_PATH: ${{ env.JAVA_HOME }}
          NATIVEPHP_ANDROID_SDK_LOCATION: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_KEYSTORE_FILE: /home/runner/.android/debug.keystore
          ANDROID_KEYSTORE_PASSWORD: android
          ANDROID_KEY_ALIAS: androiddebugkey
          ANDROID_KEY_PASSWORD: android
        run: |
          php artisan config:clear
          script -q -e -c "php artisan native:package android" /dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: interval-timer-v${{ steps.version.outputs.version }}
          path: '**/*.apk'
          retention-days: 30
          if-no-files-found: error
